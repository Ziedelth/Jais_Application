name: jais
description: A Flutter application by Ziedelth for mobile members

publish_to: 'none'
version: 1.1.1+8

environment:
  sdk: ">=2.17.0 <3.0.0"
  flutter: ">=3.0.0"

dependencies:
  brotli: ^0.5.0
  cached_network_image: ^3.2.1
  firebase_core: ^1.19.1
  firebase_messaging: ^11.4.4
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.2.4
  google_fonts: ^3.0.1
  google_mobile_ads: ^1.3.0
  http: ^0.13.4
  in_app_review: ^2.0.4
  intl: ^0.17.0
  json_annotation: ^4.5.0
  provider: ^6.0.3
  shared_preferences: ^2.0.15
  shimmer: ^2.0.0
  stack_trace: ^1.10.0
  url_launcher: ^6.1.4

dev_dependencies:
  build_runner: ^2.1.11
  flutter_launcher_icons_maker: ^0.10.2
  json_serializable: ^6.2.0
  lint: ^1.8.2

flutter_icons:
  image_path: 'assets/icon.png'
  android: true
  ios: true

flutter_native_splash:
  color: "#ffffff"
  color_dark: "#000000"
  image: 'assets/icon.png'

flutter:
  uses-material-design: true

  assets:
    - 'assets/icon.png'
